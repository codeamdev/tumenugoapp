name: Mobile CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  type-check:
    name: Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

  # ─── EAS Build (commented out — requires EXPO_TOKEN secret) ──────────────────
  # Uncomment once you add EXPO_TOKEN to repository secrets:
  #   GitHub repo → Settings → Secrets → Actions → New secret
  #   Name: EXPO_TOKEN
  #   Value: your Expo access token (expo.dev → Account → Access Tokens)
